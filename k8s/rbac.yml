# k8s/rbac.yml

apiVersion: v1
kind: ServiceAccount

metadata:
  name: resource-manager

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: pod-service-manager

rules:
  - apiGroups: [""]
    resources:
      - pods
      - services

    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups: [""]
    resources:
      - pods/status
    verbs:
      - get
      - list
      - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: pod-service-manager-binding

subjects:
  - kind: ServiceAccount
    name: resource-manager

roleRef:
  kind: Role
  name: pod-service-manager
  apiGroup: rbac.authorization.k8s.io
